<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento CNC Interativo - CADCAM BRASIL</title>
    <style>
        :root { 
            --primary: #000; --accent: #2ecc71; --bg: #f4f7f6; 
            --error: #ff4d4d; --industrial: #DCDCDC; --disabled: #95a5a6;
        }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: var(--bg); overflow: hidden; height: 100vh; }
        
        #sidebar { width: 220px; background: var(--primary); color: white; padding: 15px; display: flex; flex-direction: column; height: 100vh; z-index: 1000; }
        .lista-exercicios { flex: 1; overflow-y: auto; }
        .ex-btn { width: 100%; padding: 10px; margin: 4px 0; background: #333; border: none; color: white; cursor: pointer; text-align: left; border-radius: 4px; font-size: 13px; }
        .ex-btn.active { background: var(--accent) !important; font-weight: bold; }
        
        .logo-container { 
            margin-top: auto; 
            text-align: center; 
            padding-top: 15px; 
            padding-bottom: 30px; 
            border-top: 1px solid #444; 
        }
        .logo-img { width: 132px; height: auto; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--industrial); border-bottom: 2px solid #bbb; height: 60px; box-sizing: border-box; }
        .inputs-aluno { display: flex; gap: 8px; }
        .inputs-aluno input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: 130px; font-size: 11px; }

        #corpo-layout { display: flex; flex: 1; overflow: hidden; }

        #lado-esquerdo { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #bbb; }
        #area-visual { 
            height: 55%; 
            position: relative; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 2px solid #bbb; 
            overflow: hidden;
        }
        #img-desenho { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        #ferramenta {
            position: absolute;
            width: 250px; 
            height: 250px;
            background: url('ferramenta.png') no-repeat center; 
            background-size: contain;
            transition: top 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        left 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.3s ease-in-out;
            z-index: 10;
            pointer-events: none;
            opacity: 0; 
            transform: translate(-94.5%, -91.5%); 
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
        }

        #area-descricao { height: 45%; padding: 20px; background: white; overflow-y: auto; box-sizing: border-box; }
        .coluna-tabela { width: 25%; height: 100%; padding: 10px; overflow-y: auto; box-sizing: border-box; border-right: 1px solid #ccc; }
        #coluna-trabalho { background: #f9f9f9; }
        #coluna-gabarito { background: #eee; border-right: none; }
        .titulo-secao { font-weight: bold; text-align: center; padding: 8px; background: #444; color: white; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
        .tabela-coord { width: 100%; border-collapse: collapse; background: white; font-size: 12px; table-layout: fixed; }
        .tabela-coord th { background: #666; color: white; padding: 8px; text-align: center; }
        .tabela-coord td { border: 1px solid #ddd; padding: 5px; text-align: center; font-weight: bold; height: 42px; }
        .input-coord { width: 90%; padding: 4px; border: 2px solid #999; border-radius: 3px; text-align: center; font-weight: bold; outline: none; }
        .input-erro { border-color: var(--error) !important; background-color: #ffe6e6 !important; }
        .input-sucesso { border-color: var(--accent) !important; background-color: #e6ffed !important; color: #006400; }
        .valor-gab { visibility: hidden; font-family: 'Courier New', monospace; font-size: 18px; color: #27ae60; }
        .revelado { visibility: visible !important; }

        #footer { height: 60px; padding: 10px 20px; background: var(--industrial); border-top: 1px solid #ddd; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        
        .btn-demo { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-enviar { background: var(--disabled); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: not-allowed; font-weight: bold; }
        .btn-enviar.habilitado { background: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="text-align:center;">CADCAM BRASIL</h3>
        <div class="lista-exercicios" id="lista-botoes"></div>
        <div class="logo-container">
            <img src="logo.png" class="logo-img" onerror="this.src='logo.jpg'">
        </div>
    </div>

    <div id="main">
        <div class="header">
            <h2 id="tit-ex" style="margin:0; font-size: 16px;">Exercício 1</h2>
            <div class="inputs-aluno">
                <input type="text" id="nome-aluno" placeholder="NOME" onchange="salvarDados()">
                <input type="tel" id="whatsapp-aluno" placeholder="WHATSAPP" onchange="salvarDados()">
                <input type="email" id="email-aluno" placeholder="E-MAIL" onchange="salvarDados()">
            </div>
            <span style="font-weight:bold; font-size: 12px;">Profº Fernando</span>
        </div>

        <div id="corpo-layout">
            <div id="lado-esquerdo">
                <div id="area-visual">
                    <img id="img-desenho" src="ex_coord1.jpg">
                    <div id="ferramenta"></div>
                </div>
                <div id="area-descricao">
                    <h4 style="margin:0 0 10px 0; border-bottom: 2px solid var(--primary); display: inline-block;">Descrição do Exercício</h4>
                    <div id="texto-descricao">
                        A ferramenta aparecerá para realizar o movimento a cada acerto e desaparecerá após 3 segundos. Calibrada para MS Edge.
                    </div>
                </div>
            </div>

            <div id="coluna-trabalho" class="coluna-tabela">
                <div class="titulo-secao">SUA PROGRAMAÇÃO</div>
                <table class="tabela-coord">
                    <thead><tr><th style="width:30px">PT</th><th>X (Ø)</th><th>Z</th></tr></thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>

            <div id="coluna-gabarito" class="coluna-tabela">
                <div class="titulo-secao">GABARITO</div>
                <table class="tabela-coord">
                    <thead><tr><th style="width:30px">PT</th><th>X (Ø)</th><th>Z</th></tr></thead>
                    <tbody id="corpo-gabarito"></tbody>
                </table>
            </div>
        </div>

        <div id="footer">
            <button class="btn-demo" onclick="iniciarDemonstracao()">▶ INICIAR APRESENTAÇÃO</button>
            <button id="btn-finalizar" class="btn-enviar" disabled onclick="enviarRelatorio()">🚀 FINALIZAR E ENVIAR</button>
        </div>
    </div>

    <script>
        const mapaVisual = {
            1: {
                "A": { top: "42.5%", left: "86.2%" }, 
                "B": { top: "22.0%", left: "86.2%" }, 
                "C": { top: "22.0%", left: "81.7%" }, 
                "D": { top: "17.8%", left: "81.7%" }, 
                "E": { top: "17.8%", left: "68%" },
                "F": { top: "7%", left: "68%" },  
                "G": { top: "5.5%", left: "44%" }
            }
        };

        const exerciciosCoord = {
            1: { 
                gabarito: {
                    "A": { x: "0", z: "0" },    "B": { x: "20", z: "0" },
                    "C": { x: "20", z: "-5" },  "D": { x: "30", z: "-5" },
                    "E": { x: "30", z: "-25" }, "F": { x: "50", z: "-25" },
                    "G": { x: "50", z: "-60" }
                }
            }
        };

        let dadosPerf = JSON.parse(localStorage.getItem('cnc_data_v2')) || {
            nome: "", whatsapp: "", email: "", respostas: {}, concluidos: [],
            errosPorEx: Array(5).fill(0), acertosPorEx: Array(5).fill(0)
        };

        const pontos = ["A", "B", "C", "D", "E", "F", "G"];
        let exAtual = 1;

        function salvarDados() {
            dadosPerf.nome = document.getElementById('nome-aluno').value;
            dadosPerf.whatsapp = document.getElementById('whatsapp-aluno').value;
            dadosPerf.email = document.getElementById('email-aluno').value;
            localStorage.setItem('cnc_data_v2', JSON.stringify(dadosPerf));
        }

        function mudarExercicio(id) {
            exAtual = id;
            document.getElementById('img-desenho').src = `ex_coord${id}.jpg`;
            document.getElementById('tit-ex').innerText = `Exercício ${id}`;
            const tabela = document.getElementById('corpo-tabela');
            const gabarito = document.getElementById('corpo-gabarito');
            tabela.innerHTML = ""; gabarito.innerHTML = "";

            pontos.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p}</td>
                    <td><input type="text" class="input-coord" id="X_${p}" onchange="processar('${p}', 'x')"></td>
                    <td><input type="text" class="input-coord" id="Z_${p}" onchange="processar('${p}', 'z')"></td>`;
                tabela.appendChild(tr);

                const trG = document.createElement('tr');
                const gabX = (exerciciosCoord[id] && exerciciosCoord[id].gabarito[p]) ? exerciciosCoord[id].gabarito[p].x : "";
                const gabZ = (exerciciosCoord[id] && exerciciosCoord[id].gabarito[p]) ? exerciciosCoord[id].gabarito[p].z : "";
                trG.innerHTML = `<td>${p}</td><td><span id="gab_${p}_x" class="valor-gab">${gabX}</span></td><td><span id="gab_${p}_z" class="valor-gab">${gabZ}</span></td>`;
                gabarito.appendChild(trG);
            });
            document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${id}`)) document.getElementById(`btn-${id}`).classList.add('active');
        }

        function processar(ponto, eixo) {
            if(!exerciciosCoord[exAtual]) return;
            const input = document.getElementById(`${eixo.toUpperCase()}_${ponto}`);
            const val = input.value.trim();
            const gab = exerciciosCoord[exAtual].gabarito[ponto][eixo];
            if(val === gab) { 
                input.className = "input-coord input-sucesso"; 
                input.disabled = true;
                dadosPerf.acertosPorEx[exAtual]++;
            } else if(val !== "") { 
                input.className = "input-coord input-erro"; 
                dadosPerf.errosPorEx[exAtual]++;
            }
            salvarDados();
            checarLinhaCompleta(ponto);
        }

        function checarLinhaCompleta(ponto) {
            const inX = document.getElementById(`X_${ponto}`);
            const inZ = document.getElementById(`Z_${ponto}`);
            const tool = document.getElementById('ferramenta');
            if(inX.disabled && inZ.disabled) {
                document.getElementById(`gab_${ponto}_x`).classList.add('revelado');
                document.getElementById(`gab_${ponto}_z`).classList.add('revelado');
                if(mapaVisual[exAtual] && mapaVisual[exAtual][ponto]) {
                    const pos = mapaVisual[exAtual][ponto];
                    const ua = navigator.userAgent;
                    let ajusteLeft = (ua.includes("Chrome") && !ua.includes("Edg")) ? -2 : 0;
                    tool.style.opacity = "1";
                    tool.style.top = parseFloat(pos.top) + "%";
                    tool.style.left = (parseFloat(pos.left) + ajusteLeft) + "%";
                    setTimeout(() => { tool.style.opacity = "0"; }, 3000);
                }
            }
            verificarBotaoFinal();
        }

        async function iniciarDemonstracao() {
            const btnDemo = document.querySelector('.btn-demo');
            btnDemo.disabled = true;
            btnDemo.innerText = "⏳ EXECUTANDO...";
            for (let p of pontos) {
                const inX = document.getElementById(`X_${p}`);
                const inZ = document.getElementById(`Z_${p}`);
                const gab = exerciciosCoord[exAtual].gabarito[p];
                if(gab) {
                    inX.value = gab.x; processar(p, 'x');
                    await new Promise(r => setTimeout(r, 600));
                    inZ.value = gab.z; processar(p, 'z');
                    await new Promise(r => setTimeout(r, 3800));
                }
            }
            btnDemo.disabled = false;
            btnDemo.innerText = "▶ INICIAR APRESENTAÇÃO";
        }

        function verificarBotaoFinal() {
            const inputs = document.querySelectorAll('.input-coord');
            if(inputs.length > 0) {
                const todosCertos = Array.from(inputs).every(i => i.disabled);
                const btn = document.getElementById('btn-finalizar');
                if(todosCertos) { btn.disabled = false; btn.classList.add('habilitado'); }
            }
        }

        async function enviarRelatorio() {
            const btn = document.getElementById('btn-finalizar');
            const nome = document.getElementById('nome-aluno').value;
            const whats = document.getElementById('whatsapp-aluno').value.replace(/\D/g, '');
            const email = document.getElementById('email-aluno').value;
            if (!nome || whats.length < 10 || !email) {
                alert("⚠️ Preencha Nome, WhatsApp e E-mail corretamente!");
                return;
            }
            btn.innerText = "⏳ ENVIANDO...";
            btn.disabled = true;

            let totalAcertos = 0, totalErros = 0, relTexto = "";
            for(let i=1; i<=4; i++) {
                const a = dadosPerf.acertosPorEx[i] || 0, e = dadosPerf.errosPorEx[i] || 0;
                totalAcertos += a; totalErros += e;
                relTexto += `Ex ${i}: ${Math.round((a/(a+e||1))*100)}% (${a} Ac / ${e} Er)\n`;
            }
            const notaGeral = Math.round((totalAcertos / (totalAcertos + totalErros || 1)) * 100);
            const status = (notaGeral >= 60) ? "Aprovado!" : "Reprovado...";
            const msgZap = `Relatório CNC: ${nome} | Nota: ${notaGeral}% | ${status}`;
            const linkZap = `https://wa.me/55${whats}?text=${encodeURIComponent(msgZap)}`;

            // --- COLE SEU LINK ABAIXO ---
            const URL_GOOGLE = "COLE_AQUI_SEU_LINK_DO_GOOGLE_SCRIPT";

            const params = new URLSearchParams();
            params.append("ALUNO", nome); params.append("EMAIL_ALUNO", email);
            params.append("WHATSAPP", whats); params.append("APROVEITAMENTO_GERAL", notaGeral + "%");
            params.append("COPIE_ESTE_LINK_PARA_WHATSAPP", linkZap); params.append("RELATORIO_TECNICO", relTexto);

            try {
                await fetch(URL_GOOGLE, { method: "POST", mode: "no-cors", body: params });
                alert("✅ CERTIFICAÇÃO ENVIADA COM SUCESSO!");
                btn.innerText = "🚀 RELATÓRIO ENVIADO";
                btn.classList.add('habilitado');
            } catch (e) {
                alert("❌ Erro de conexão. Tente novamente.");
                btn.disabled = false; btn.innerText = "🚀 TENTAR REENVIAR";
            }
        }

        window.onload = () => {
            const menu = document.getElementById('lista-botoes');
            for(let i=1; i<=4; i++){
                const b = document.createElement('button'); b.className = 'ex-btn';
                b.id = `btn-${i}`; b.innerText = `Exercício ${i}`; b.onclick = () => mudarExercicio(i);
                menu.appendChild(b);
            }
            mudarExercicio(1);
            if(dadosPerf.nome) document.getElementById('nome-aluno').value = dadosPerf.nome;
            if(dadosPerf.whatsapp) document.getElementById('whatsapp-aluno').value = dadosPerf.whatsapp;
            if(dadosPerf.email) document.getElementById('email-aluno').value = dadosPerf.email;
        };
    </script>
</body>
</html>
